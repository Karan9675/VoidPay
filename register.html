<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — VoidPay</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>

  <nav>
    <a href="index.html" class="nav-logo">✦ VoidPay</a>
    <div class="nav-actions">
      <a href="login.html" class="btn btn-ghost">Login</a>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="card auth-card">

      <div class="auth-header">
        <span class="logo">✦ VoidPay</span>
        <h2>Create Account</h2>
        <p>Start protecting your gig income today</p>
      </div>

      <div id="success-msg" style="display:none;background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3);border-radius:10px;padding:12px 16px;font-size:0.85rem;color:#4ade80;margin-bottom:20px;"></div>
      <div id="error-msg" style="display:none;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:10px;padding:12px 16px;font-size:0.85rem;color:#f87171;margin-bottom:20px;"></div>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="Arjun Sharma" />
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="reg-email" placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min 6 characters" />
      </div>

      <div class="form-group">
        <label>City</label>
        <input type="text" id="reg-city" placeholder="delhi, mumbai, bangalore…" />
      </div>

      <div class="form-group">
        <label>Occupation</label>
        <input type="text" id="reg-occupation" placeholder="Delivery Partner, Freelancer…" />
      </div>

      <button class="btn btn-primary btn-full" style="margin-top:8px;" onclick="handleRegister()">
        Create Account →
      </button>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
  <script>
    function handleRegister() {
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const city = document.getElementById('reg-city').value.trim().toLowerCase();
      const occupation = document.getElementById('reg-occupation').value.trim();

      const err = document.getElementById('error-msg');
      const success = document.getElementById('success-msg');
      err.style.display = 'none';
      success.style.display = 'none';

      if (!name || !email || !password || !city) {
        err.style.display = 'block';
        err.textContent = 'Please fill in all required fields.';
        return;
      }
      if (password.length < 6) {
        err.style.display = 'block';
        err.textContent = 'Password must be at least 6 characters.';
        return;
      }

      const users = JSON.parse(localStorage.getItem('gigshield_users') || '[]');
      if (users.find(u => u.email === email)) {
        err.style.display = 'block';
        err.textContent = 'An account with this email already exists.';
        return;
      }

      const newUser = { name, email, password, city, occupation, plan: 'basic', createdAt: new Date().toISOString() };
      users.push(newUser);
      localStorage.setItem('gigshield_users', JSON.stringify(users));
      localStorage.setItem('gigshield_user', JSON.stringify(newUser));

      success.style.display = 'block';
      success.textContent = '✓ Account created! Redirecting to plan selection…';

      setTimeout(() => { window.location.href = 'plans.html'; }, 1500);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleRegister();
    });
  </script>
</body>
</html>
