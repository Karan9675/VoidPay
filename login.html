<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — VoidPay</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>

  <nav>
    <a href="index.html" class="nav-logo">✦ VoidPay</a>
    <div class="nav-actions">
      <a href="register.html" class="btn btn-primary">Register</a>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="card auth-card">

      <div class="auth-header">
        <span class="logo">✦ VoidPay</span>
        <h2>Welcome back</h2>
        <p>Sign in to your insurance dashboard</p>
      </div>

      <div id="error-msg" style="display:none;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:60px;padding:12px 16px;font-size:0.85rem;color:#f87171;margin-bottom:20px;"></div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" />
      </div>

      <div style="display:flex;justify-content:flex-end;margin-bottom:24px;">
        <a href="#" style="font-size:0.82rem;color:var(--pink-light);text-decoration:none;">Forgot password?</a>
      </div>

      <button class="btn btn-primary btn-full" onclick="handleLogin()">
        Sign In →
      </button>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Create one free</a>
      </div>

      <div class="divider"></div>

      <div style="text-align:center;">
        <p style="font-size:0.78rem;color:var(--text-muted);margin-bottom:16px;">Or continue with demo account</p>
        <button class="btn btn-outline btn-full" onclick="demoLogin()">
          🚀 Demo Login (demo@voidpay.ai)
        </button>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
  <script>
    function handleLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const err = document.getElementById('error-msg');

      if (!email || !password) {
        err.style.display = 'block';
        err.textContent = 'Please fill in all fields.';
        return;
      }

      const users = JSON.parse(localStorage.getItem('gigshield_users') || '[]');
      const user = users.find(u => u.email === email && u.password === password);

      if (!user) {
        err.style.display = 'block';
        err.textContent = 'Invalid email or password. Try the demo login.';
        return;
      }

      localStorage.setItem('gigshield_user', JSON.stringify(user));
      window.location.href = 'dashboard.html';
    }

    function demoLogin() {
      const demo = { name: 'Arjun Sharma', email: 'demo@voidpay.ai', city: 'delhi', plan: 'pro' };
      localStorage.setItem('gigshield_user', JSON.stringify(demo));
      window.location.href = 'dashboard.html';
    }

    // Allow Enter key
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
